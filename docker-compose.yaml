version: "3.8"

services:
  new-mcp:
    # build: .
    image: mujkjk/new-mcp:latest
    container_name: new-mcp
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/newmcp.db
      # - DB_TYPE=mysql
      # - SQL_DSN=newmcp:password@tcp(mysql:3306)/newmcp?charset=utf8mb4&parseTime=True
      - SESSION_SECRET=change-me-to-a-random-string
      - CRYPTO_SECRET=change-me-to-a-random-string
    # Uncomment the following to use MySQL instead of SQLite:
    # depends_on:
    #   mysql:
    #     condition: service_healthy

  # Uncomment to use MySQL:
  # mysql:
  #   image: mysql:8.0
  #   container_name: new-mcp-mysql
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: newmcp
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

  # Uncomment to use PostgreSQL:
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: new-mcp-postgres
  #   restart: always
  #   environment:
  #     POSTGRES_DB: newmcp
  #     POSTGRES_USER: newmcp
  #     POSTGRES_PASSWORD: yourpassword
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U newmcp"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

  # Uncomment to use Redis:
  # redis:
  #   image: redis:7-alpine
  #   container_name: new-mcp-redis
  #   restart: always
  #   volumes:
  #     - redis-data:/data
  #   ports:
  #     - "6379:6379"

# No named volumes in the default config — data/logs use bind mounts (./data, ./logs).
# When you uncomment a DB/Redis service above, uncomment a matching named volume here too:
# volumes:
#   mysql-data:
#   postgres-data:
#   redis-data:
