version: "3.8"

services:
  newmcp:
    build: .
    container_name: new-mcp
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - newmcp-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/newmcp.db
      - SESSION_SECRET=change-me-to-a-random-string
      - CRYPTO_SECRET=change-me-to-a-random-string
      - BASE_URL=http://localhost:3000
    # Uncomment the following to use MySQL instead of SQLite:
    # depends_on:
    #   mysql:
    #     condition: service_healthy

  # Uncomment to use MySQL:
  # mysql:
  #   image: mysql:8.0
