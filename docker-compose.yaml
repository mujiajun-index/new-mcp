  #     timeout: 3s
  #     retries: 10

  # Uncomment to use Redis:
  # redis:
  #   image: redis:7-alpine
  #   container_name: new-mcp-redis
  #   restart: always
  #   volumes:
  #     - redis-data:/data
  #   ports:
  #     - "6379:6379"

